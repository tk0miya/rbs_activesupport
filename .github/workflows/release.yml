name: Release
on:
  push:
    branches:
      - main
    paths:
      - 'lib/rbs_activesupport/version.rb'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.308.0
        with:
          ruby-version: ruby
          bundler-cache: true
      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
