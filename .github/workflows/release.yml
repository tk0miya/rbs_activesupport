name: Release
on:
  push:
    branches:
      - main
    paths:
      - 'lib/rbs_activesupport/version.rb'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: ruby
          # Skip bundler cache to avoid the cache-poisoning attack at release time:
          # a poisoned cache written from a PR could otherwise be reused here
          # and end up shipped to RubyGems.
          # See https://docs.zizmor.sh/audits/#cache-poisoning
          bundler-cache: false
      - name: Install dependencies
        run: bundle install
      - name: Publish to RubyGems
        uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # v1.2.0
